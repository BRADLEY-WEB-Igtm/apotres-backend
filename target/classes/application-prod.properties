# ============================================================
# application-prod.properties — CONFIGURATION PRODUCTION
# Ce fichier remplace application.properties en production
# Pour l'activer : java -jar app.jar --spring.profiles.active=prod
# OU : définir SPRING_PROFILES_ACTIVE=prod dans les variables d'env
# ============================================================


# ============================================================
# SERVEUR
# ============================================================
server.port=8080
server.servlet.context-path=/


# ============================================================
# BASE DE DONNÉES — À REMPLIR AVEC LES INFOS DE TON HÉBERGEUR
# ============================================================

# Sur Railway : copie l'URL depuis le tableau de bord Railway
# Format : jdbc:mysql://HOST:PORT/NOM_BASE?useSSL=true&serverTimezone=UTC
spring.datasource.url=${DATABASE_URL}

# Username et password depuis les variables d'environnement
# (ne JAMAIS les écrire en clair dans ce fichier)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
# JPA / HIBERNATE — CONFIG PRODUCTION
# ============================================================

# IMPORTANT : "validate" en production (ne modifie PAS la BD)
# Contrairement à "update" en dev qui peut modifier les tables
spring.jpa.hibernate.ddl-auto=validate

# DÉSACTIVÉ en production — les requêtes SQL ne s'affichent pas
# dans les logs (performance + sécurité)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# ============================================================
# UPLOAD DE FICHIERS
# ============================================================
spring.servlet.multipart.enabled=true

# Taille max audio — augmente si tes sessions Zoom sont longues
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Dossier de stockage des uploads
app.upload.dir=/var/uploads


# ============================================================
# JWT — SÉCURITÉ CRITIQUE
# ============================================================

# OBLIGATOIRE : Change cette clé secrète avant déploiement !
# Génère une clé aléatoire forte avec :
# openssl rand -base64 64
# Puis colle-la ici OU dans la variable d'env JWT_SECRET
app.jwt.secret=${JWT_SECRET}

# Durée de validité du token : 8h en production (au lieu de 24h)
# Moins de temps = plus sécurisé
app.jwt.expiration=28800000


# ============================================================
# CORS — UNIQUEMENT TON VRAI DOMAINE EN PRODUCTION
# Les localhost sont supprimés !
# ============================================================
app.cors.allowed-origins=https://doctrinedesapotres.com,https://www.doctrinedesapotres.com


# ============================================================
# LOGS — NIVEAU MINIMAL EN PRODUCTION
# ============================================================

# WARN = seulement les avertissements et erreurs (pas les infos de debug)
logging.level.com.doctrine=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework=WARN

# Fichier de log sur le serveur
logging.file.name=/var/log/doctrine-apotres/app.log
logging.file.max-size=10MB
logging.file.max-history=7