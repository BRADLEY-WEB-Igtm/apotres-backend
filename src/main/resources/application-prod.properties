# ============================================================
# CONFIGURATION — Doctrine des Apôtres Backend
# Les variables ${...} sont injectées par Railway en production
# Les valeurs après : sont les valeurs par défaut pour le dev local
# ============================================================

# ── SERVEUR ──────────────────────────────────────────────────
# Railway injecte automatiquement PORT — sinon 8080 en local
server.port=${PORT:8080}
server.servlet.context-path=/

# ── BASE DE DONNÉES MySQL ─────────────────────────────────────
# Railway injecte MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:doctrine_apotres}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── UPLOAD FICHIERS ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:DoctrineDesApotres@2026#SecureKey!JWT$Token*Spring&Boot%Admin}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5500,http://localhost:5501,http://localhost:5502,http://127.0.0.1:5500,http://127.0.0.1:5501}

# ── LOGS ──────────────────────────────────────────────────────
logging.level.com.doctrine=INFO
logging.level.org.springframework.security=WARN
